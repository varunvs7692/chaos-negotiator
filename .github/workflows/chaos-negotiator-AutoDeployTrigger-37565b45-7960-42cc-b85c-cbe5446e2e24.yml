name: Trigger auto deployment for chaos-negotiator

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/chaos-negotiator-AutoDeployTrigger-37565b45-7960-42cc-b85c-cbe5446e2e24.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      REGISTRY: chaosnegroreg13921.azurecr.io
      IMAGE_NAME: chaos-negotiator
      AZURE_APP_NAME: chaos-negotiator
      AZURE_RESOURCE_GROUP: chaos-negotiator-rg
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CHAOSNEGOTIATOR_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CHAOSNEGOTIATOR_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CHAOSNEGOTIATOR_AZURE_SUBSCRIPTION_ID }}

      - name: Wait for Container App to be ready
        run: |
          timeout=600
          end=$((SECONDS+timeout))
          
          while [ $SECONDS -lt $end ]; do
            state=$(az containerapp show --name chaos-negotiator --resource-group chaos-negotiator-rg --query properties.provisioningState -o tsv)
            if [[ "$state" == "Succeeded" ]]; then
              echo "Container App is ready."
              break
            elif [[ "$state" == "Failed" ]]; then
                echo "Container App is in a failed state."
                exit 1
            fi
            echo "Container App is not ready yet, current state: $state. Waiting..."
            sleep 30
          done

          if [[ "$state" != "Succeeded" ]]; then
            echo "Timed out waiting for Container App to be ready."
            exit 1
          fi

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY }}
          registryUsername: ${{ secrets.CHAOSNEGOTIATOR_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CHAOSNEGOTIATOR_REGISTRY_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for Container App to become idle again
        run: |
          for i in {1..30}; do
            state=$(az containerapp show --name ${{ env.AZURE_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query properties.provisioningState -o tsv)
            if [[ "$state" == "Succeeded" || "$state" == "Failed" || "$state" == "Canceled" ]]; then
              echo "Container App is idle with provisioning state '$state'."
              exit 0
            fi
            echo "Container App provisioning state is '$state' (attempt $i/30). Waiting 10s..."
            sleep 10
          done

          echo "Container App is still busy after 5 minutes."
          exit 1

      - name: Update Container App image
        run: |
          for i in {1..5}; do
            if az containerapp update \
              --name ${{ env.AZURE_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}; then
              echo "Container App update succeeded on attempt $i."
              exit 0
            fi
            echo "Container App update failed on attempt $i. Retrying in 30s..."
            sleep 30
          done

          echo "Container App update failed after 5 attempts."
          exit 1


