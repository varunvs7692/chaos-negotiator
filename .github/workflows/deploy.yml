name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: chaos-negotiator
  AZURE_RESOURCE_GROUP: chaos-negotiator-rg
  AZURE_APP_NAME: chaos-negotiator
  AZURE_REGISTRY_NAME: chaosnegroreg13921
  AZURE_OPENAI_API_VERSION: 2024-02-15-preview

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ${{ secrets.AZURE_REGISTRY_URL }}
    
    permissions:
      id-token: write
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run tests
      run: pytest tests/ -v

    - name: Validate Azure auth secrets
      run: |
        test -n "${{ secrets.AZURE_CLIENT_ID }}" || (echo "Missing AZURE_CLIENT_ID" && exit 1)
        test -n "${{ secrets.AZURE_TENANT_ID }}" || (echo "Missing AZURE_TENANT_ID" && exit 1)
        test -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" || (echo "Missing AZURE_SUBSCRIPTION_ID" && exit 1)
        test -n "${{ secrets.AZURE_CLIENT_SECRET }}" || (echo "Missing AZURE_CLIENT_SECRET" && exit 1)
    
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: |
          {
            "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
            "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
            "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
            "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
          }

    - name: Wait for Container App to become idle
      if: success()
      shell: bash
      run: |
        app_exists=$(az containerapp show --name ${{ env.AZURE_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query name -o tsv 2>/dev/null || true)
        if [ -z "$app_exists" ]; then
          echo "Container App does not exist yet. Continuing with infrastructure deployment."
          exit 0
        fi

        for i in {1..36}; do
          state=$(az containerapp show --name ${{ env.AZURE_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query properties.provisioningState -o tsv)
          if [ "$state" = "Succeeded" ] || [ "$state" = "Failed" ] || [ "$state" = "Canceled" ]; then
            echo "Container App is idle with provisioning state '$state'."
            exit 0
          fi
          echo "Container App provisioning state is '$state' (attempt $i/36). Waiting 10s..."
          sleep 10
        done

        echo "Container App is still busy after 6 minutes."
        exit 1

    - name: Deploy Bicep infrastructure
      if: success()
      shell: bash
      run: |
        set -euo pipefail
        for i in {1..5}; do
          if az deployment group create \
            --name "bicep-deployment-$i" \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file ./infra/main.bicep \
            --parameters location=eastus environment=prod appName=${{ env.AZURE_APP_NAME }} containerRegistryName=${{ env.AZURE_REGISTRY_NAME }} azureOpenAiKey="${{ secrets.AZURE_OPENAI_KEY }}" azureOpenAiEndpoint="${{ secrets.AZURE_OPENAI_ENDPOINT }}" openAiApiVersion=${{ env.AZURE_OPENAI_API_VERSION }}; then
            echo "Bicep deployment succeeded on attempt $i."
            exit 0
          fi
          echo "Bicep deployment failed on attempt $i. Retrying in 60s..."
          sleep 60
        done
        echo "Bicep deployment failed after 5 attempts."
        exit 1
    
    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.REGISTRY }}
        username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
        password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

    - name: Validate registry URL
      if: success()
      run: |
        if [ -z "${{ env.REGISTRY }}" ]; then
          echo "Missing AZURE_REGISTRY_URL" && exit 1
        fi
        if echo "${{ env.REGISTRY }}" | grep -q "[[:space:]]"; then
          echo "AZURE_REGISTRY_URL contains whitespace" && exit 1
        fi
        if ! echo "${{ env.REGISTRY }}" | grep -qi "\.azurecr\.io$"; then
          echo "AZURE_REGISTRY_URL must end with .azurecr.io" && exit 1
        fi
    
    - name: Build Docker image
      if: success()
      run: |
        docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
        docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
    
    - name: Push Docker image
      if: success()
      run: |
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

    - name: Wait for Container App provisioning
      if: success()
      run: |
        for i in {1..30}; do
          state=$(az containerapp show --name ${{ env.AZURE_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query properties.provisioningState -o tsv || echo "Unknown")
          if [ "$state" = "Succeeded" ]; then
            echo "Container App ready."
            exit 0
          fi
          echo "Provisioning state: $state (attempt $i/30). Waiting..."
          sleep 10
        done
        echo "Container App still provisioning after wait."
        exit 1
    
    - name: Update Container App
      if: success()
      run: |
        az containerapp update \
          --name ${{ env.AZURE_APP_NAME }} \
          --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    - name: Post-deploy smoke test
      if: success()
      run: |
        set -euo pipefail

        APP_FQDN=$(az containerapp show --name ${{ env.AZURE_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query properties.configuration.ingress.fqdn -o tsv)
        if [ -z "$APP_FQDN" ]; then
          echo "Failed to resolve Container App FQDN"
          exit 1
        fi

        APP_URL="https://$APP_FQDN"
        echo "Running smoke tests against $APP_URL"
        ANALYZE_BODY='{"deployment_id":"smoke-deploy","service_name":"smoke-service","environment":"staging","version":"v0.0.1","changes":[{"file_path":"src/smoke.py","change_type":"modify","lines_changed":1,"risk_tags":["test"],"description":"CI smoke test"}]}'

        print_diagnostics() {
          echo "----- Container App diagnostics -----"
          az containerapp show \
            --name ${{ env.AZURE_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "{latestRevisionName:properties.latestRevisionName,latestReadyRevisionName:properties.latestReadyRevisionName,traffic:properties.configuration.ingress.traffic}" \
            -o json || true
          az containerapp revision list \
            --name ${{ env.AZURE_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?properties.active].{name:name,createdTime:properties.createdTime,healthState:properties.healthState,provisioningState:properties.provisioningState,trafficWeight:properties.trafficWeight}" \
            -o table || true
          echo "-------------------------------------"
        }

        run_probe() {
          method="$1"
          path="$2"
          data="${3:-}"
          body_file=$(mktemp)

          if [ -n "$data" ]; then
            status_code=$(curl -sS -o "$body_file" -w "%{http_code}" -X "$method" "$APP_URL$path" \
              -H "Content-Type: application/json" \
              --data "$data")
          else
            status_code=$(curl -sS -o "$body_file" -w "%{http_code}" -X "$method" "$APP_URL$path")
          fi

          if [ "$status_code" != "200" ]; then
            echo "Probe failed: $method $path returned $status_code"
            echo "Response body:"
            cat "$body_file" || true
            rm -f "$body_file"
            return 1
          fi

          rm -f "$body_file"
          return 0
        }

        wait_for_endpoint() {
          method="$1"
          path="$2"
          data="${3:-}"
          label="$4"

          for i in {1..30}; do
            if run_probe "$method" "$path" "$data"; then
              echo "$label passed on attempt $i/30"
              return 0
            fi
            echo "$label not ready yet (attempt $i/30). Waiting 10s..."
            sleep 10
          done

          echo "$label failed after 30 attempts."
          print_diagnostics
          return 1
        }

        echo "Waiting for app readiness: GET /health"
        wait_for_endpoint "GET" "/health" "" "Health check"

        echo "Smoke test: GET /api"
        wait_for_endpoint "GET" "/api" "" "GET /api"

        echo "Smoke test: POST /api/deployments/evaluate"
        wait_for_endpoint "POST" "/api/deployments/evaluate" "$ANALYZE_BODY" "POST /api/deployments/evaluate"

        echo "Smoke test: POST /analyze (compatibility alias)"
        wait_for_endpoint "POST" "/analyze" "$ANALYZE_BODY" "POST /analyze"
    
    - name: Set secrets in Key Vault
      if: success()
      run: |
        KV_NAME=$(echo "${{ env.AZURE_APP_NAME }}-kv" | tr -d '-')
        for i in {1..12}; do
          if az keyvault secret set --vault-name "$KV_NAME" --name "azure-openai-key" --value "${{ secrets.AZURE_OPENAI_KEY }}" >/dev/null 2>&1 \
            && az keyvault secret set --vault-name "$KV_NAME" --name "azure-openai-endpoint" --value "${{ secrets.AZURE_OPENAI_ENDPOINT }}" >/dev/null 2>&1; then
            echo "Key Vault secrets set successfully."
            exit 0
          fi
          echo "Key Vault RBAC not ready yet (attempt $i/12). Waiting 15s..."
          sleep 15
        done
        echo "Failed to set Key Vault secrets after retries."
        exit 1
